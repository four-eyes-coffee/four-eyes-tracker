<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root { --black:#000; --white:#fff; --blue:#2033ff; --yellow:#e6ff00; --card:#111; --border:rgba(255,255,255,0.12); --muted:rgba(255,255,255,0.35); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--black); color:var(--white); font-family:'Rubik',sans-serif; min-height:100vh; padding-bottom:80px; }
  header { background:var(--black); padding:18px 20px 14px; border-bottom:3px solid var(--yellow); display:flex; align-items:center; justify-content:space-between; }
  .logo-img { height:44px; width:auto; display:block; }
  .session-date { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--yellow); }
  .tabs { display:flex; border-bottom:2px solid var(--border); background:var(--black); position:sticky; top:0; z-index:10; }
  .tab { flex:1; padding:13px 4px; border:none; background:transparent; font-family:'Rubik',sans-serif; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); cursor:pointer; position:relative; transition:color 0.2s; -webkit-tap-highlight-color:transparent; }
  .tab::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:var(--yellow); transform:scaleX(0); transition:transform 0.2s; }
  .tab.active { color:var(--white); }
  .tab.active::after { transform:scaleX(1); }
  .panel { display:none; padding:16px; }
  .panel.active { display:block; }

  /* SECTION */
  .sec-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; margin-top:18px; }
  .sec-row:first-child { margin-top:0; }
  .sec-label { font-size:9px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
  .sec-action { padding:5px 11px; background:transparent; border:1.5px solid var(--yellow); border-radius:2px; font-family:'Rubik',sans-serif; font-size:9px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; color:var(--yellow); cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .sec-action:active { background:var(--yellow); color:var(--black); }

  /* INVENTORY */
  .inv-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .inv-card { background:var(--card); border:1.5px solid var(--border); border-top:3px solid var(--yellow); border-radius:3px; padding:14px 12px; position:relative; }
  .inv-edit { position:absolute; top:8px; right:8px; background:none; border:none; color:rgba(255,255,255,0.25); font-size:12px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .inv-edit:active { color:var(--yellow); }
  .inv-name { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; padding-right:18px; }
  .inv-price { font-size:10px; color:var(--muted); font-weight:500; margin-bottom:12px; }
  .inv-nums { display:flex; justify-content:space-between; align-items:flex-end; }
  .inv-big { font-size:30px; font-weight:900; line-height:1; }
  .inv-big.low { color:var(--blue); }
  .inv-big.out { color:rgba(255,255,255,0.2); }
  .inv-lbl { font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .inv-right { text-align:right; font-size:12px; font-weight:700; color:var(--muted); line-height:1.6; }
  .inv-right b { color:var(--white); font-weight:900; }
  .inv-bar { height:3px; background:rgba(255,255,255,0.08); border-radius:2px; margin-top:10px; overflow:hidden; }
  .inv-bar-fill { height:100%; background:var(--yellow); border-radius:2px; transition:width 0.3s; }
  .inv-bar-fill.low { background:var(--blue); }

  /* REVENUE */
  .rev-card { background:var(--yellow); color:var(--black); border-radius:3px; padding:18px 16px; }
  .rev-title { font-size:9px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:rgba(0,0,0,0.45); margin-bottom:12px; }
  .rev-row { display:flex; justify-content:space-between; margin-bottom:5px; font-size:12px; font-weight:500; }
  .rev-row .n { color:rgba(0,0,0,0.55); }
  .rev-row .a { font-weight:700; }
  .rev-div { border:none; border-top:1px solid rgba(0,0,0,0.15); margin:10px 0; }
  .rev-total { display:flex; justify-content:space-between; align-items:baseline; }
  .rev-total .l { font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:1px; }
  .rev-total .v { font-size:32px; font-weight:900; letter-spacing:-1px; }
  .reset-btn { width:100%; padding:12px; background:transparent; border:2px solid var(--border); border-radius:3px; font-family:'Rubik',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); cursor:pointer; margin-top:12px; }
  .reset-btn:active { border-color:var(--yellow); color:var(--yellow); }

  /* SALE FORM */
  .sale-form { background:var(--card); border:1.5px solid var(--border); border-radius:3px; padding:18px 14px; }
  .fsec { font-size:9px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; margin-top:16px; }
  .fsec:first-child { margin-top:0; }
  .field input { width:100%; padding:11px 12px; background:#000; border:2px solid var(--border); border-radius:3px; font-family:'Rubik',sans-serif; font-size:14px; font-weight:500; color:var(--white); outline:none; transition:border-color 0.15s; }
  .field input:focus { border-color:var(--yellow); }
  .field input::placeholder { color:rgba(255,255,255,0.2); }

  /* CART ITEMS */
  .items-list { display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
  .item-row { background:#000; border:1.5px solid var(--border); border-radius:3px; padding:10px 12px; display:flex; align-items:center; gap:10px; }
  .item-row-left { flex:1; }
  .item-row-name { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .item-row-price { font-size:10px; color:var(--muted); margin-top:2px; }
  .item-row-controls { display:flex; align-items:center; gap:6px; }
  .item-qty { font-size:18px; font-weight:900; min-width:22px; text-align:center; line-height:1; }
  .ibtn { width:28px; height:28px; border-radius:2px; border:2px solid var(--border); background:transparent; color:var(--white); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; user-select:none; }
  .ibtn:active { background:var(--yellow); color:var(--black); border-color:var(--yellow); }
  .item-remove { background:none; border:none; color:rgba(255,255,255,0.2); font-size:14px; cursor:pointer; padding:0 0 0 2px; -webkit-tap-highlight-color:transparent; }
  .item-remove:active { color:var(--yellow); }

  /* FLAVOR PICKER */
  .flavor-picker { display:flex; gap:7px; flex-wrap:wrap; }
  .flavor-btn { padding:8px 13px; border-radius:2px; border:2px solid var(--border); background:transparent; font-family:'Rubik',sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); cursor:pointer; -webkit-tap-highlight-color:transparent; display:flex; flex-direction:column; gap:1px; transition:border-color 0.12s; }
  .flavor-btn .fn { color:inherit; }
  .flavor-btn .fs { font-size:9px; opacity:0.6; }
  .flavor-btn.added { border-color:var(--yellow); color:var(--yellow); pointer-events:none; }
  .flavor-btn:disabled { opacity:0.25; pointer-events:none; }

  /* PAYMENT */
  .pay-pills { display:flex; gap:7px; flex-wrap:wrap; }
  .pay-pill { padding:9px 14px; border-radius:2px; border:2px solid var(--border); background:transparent; font-family:'Rubik',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .pay-pill.selected { background:var(--white); color:var(--black); border-color:var(--white); }

  /* DISCOUNT */
  .discount-row { display:flex; align-items:center; gap:10px; }
  .disc-label { font-size:14px; font-weight:900; color:var(--muted); flex-shrink:0; }
  .discount-input { flex:1; padding:11px 12px; background:#000; border:2px solid var(--border); border-radius:3px; font-family:'Rubik',sans-serif; font-size:14px; font-weight:500; color:var(--white); outline:none; }
  .discount-input:focus { border-color:var(--yellow); }
  .discount-input::placeholder { color:rgba(255,255,255,0.15); }

  /* ORDER TOTAL */
  .order-summary { background:#000; border:1.5px solid var(--yellow); border-radius:3px; padding:10px 14px; margin-top:14px; display:flex; justify-content:space-between; align-items:baseline; }
  .order-summary .ol { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.4); }
  .order-summary .ov { font-size:24px; font-weight:900; color:var(--yellow); }
  .submit-btn { width:100%; padding:15px; background:var(--yellow); color:var(--black); border:none; border-radius:3px; font-family:'Rubik',sans-serif; font-size:12px; font-weight:900; letter-spacing:2.5px; text-transform:uppercase; cursor:pointer; margin-top:14px; }
  .submit-btn:active { opacity:0.8; }

  /* SUCCESS */
  .sale-success { display:none; padding:32px 16px 0; text-align:center; }
  .sale-success.show { display:block; }
  .si { font-size:48px; margin-bottom:12px; }
  .sm { font-size:18px; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(--yellow); margin-bottom:4px; }
  .ss { font-size:11px; color:var(--muted); letter-spacing:0.5px; margin-bottom:24px; }
  .log-again-btn { width:100%; padding:15px; background:var(--yellow); color:var(--black); border:none; border-radius:3px; font-family:'Rubik',sans-serif; font-size:12px; font-weight:900; letter-spacing:2.5px; text-transform:uppercase; cursor:pointer; }
  .log-again-btn:active { opacity:0.8; }
  .see-history-btn { width:100%; padding:12px; background:transparent; border:2px solid var(--border); border-radius:3px; font-family:'Rubik',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); cursor:pointer; margin-top:8px; }
  .see-history-btn:active { border-color:var(--white); color:var(--white); }

  /* HISTORY */

  .sale-card { background:var(--card); border:1.5px solid var(--border); border-radius:3px; padding:13px 14px; margin-bottom:8px; animation:slideIn 0.18s ease; }

  .edit-btn:active { border-color:var(--yellow); color:var(--yellow); }
  .del-btn { background:none; border:none; color:rgba(255,255,255,0.15); font-size:14px; cursor:pointer; padding:0 0 0 4px; -webkit-tap-highlight-color:transparent; }
  .del-btn:active { color:var(--yellow); }

  /* MODALS */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:100; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#111; border:2px solid var(--yellow); border-bottom:none; border-radius:6px 6px 0 0; width:100%; max-width:480px; padding:22px 18px 36px; animation:slideUp 0.2s ease; max-height:85vh; overflow-y:auto; }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-hdr { font-size:11px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--yellow); margin-bottom:18px; display:flex; justify-content:space-between; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1; }
  .modal .field { margin-bottom:14px; }
  .modal .field label { display:block; font-size:9px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  .modal .field input { width:100%; padding:10px 12px; background:#000; border:2px solid var(--border); border-radius:3px; font-family:'Rubik',sans-serif; font-size:14px; font-weight:500; color:var(--white); outline:none; }
  .modal .field input:focus { border-color:var(--yellow); }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-save { width:100%; padding:13px; background:var(--yellow); color:var(--black); border:none; border-radius:3px; font-family:'Rubik',sans-serif; font-size:11px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:6px; }
  .modal-del { width:100%; padding:11px; background:transparent; border:2px solid rgba(255,255,255,0.1); border-radius:3px; font-family:'Rubik',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); cursor:pointer; margin-top:8px; }
  .modal-del:active { border-color:var(--yellow); color:var(--yellow); }
  .pending-modal-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; }
  .pending-modal-item:last-child { border-bottom:none; }
  .pending-modal-item .pk { color:var(--muted); font-weight:500; }
  .pending-modal-item .pv { font-weight:700; text-align:right; }
  .modal-confirm { width:100%; padding:13px; background:var(--yellow); color:var(--black); border:none; border-radius:3px; font-family:'Rubik',sans-serif; font-size:11px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:6px; }
  .modal-confirm:active { opacity:0.8; }
  .pending-card { background:var(--card); border:1.5px solid var(--border); border-left:3px solid var(--yellow); border-radius:3px; padding:13px 14px; margin-bottom:8px; }
  .pending-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
  .pending-name { font-size:14px; font-weight:700; }
  .pending-window { font-size:10px; color:var(--yellow); font-weight:700; letter-spacing:1px; text-transform:uppercase; }
  .pending-items { font-size:11px; color:var(--muted); margin-bottom:10px; }
  .pending-actions { display:flex; gap:8px; }
  .approve-btn { flex:1; padding:10px; background:var(--yellow); color:var(--black); border:none; border-radius:3px; font-family:'Rubik',sans-serif; font-size:10px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; }
  .approve-btn:active { opacity:0.8; }
  .reject-btn { padding:10px 14px; background:transparent; border:1.5px solid var(--border); border-radius:3px; font-family:'Rubik',sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); cursor:pointer; }
  .reject-btn:active { border-color:var(--yellow); color:var(--yellow); }

<div class="tabs">
  <button class="tab active" onclick="switchTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="switchTab('newsale')">New Sale</button>
  <button class="tab" onclick="switchTab('history')">History</button>
  <button class="tab" onclick="switchTab('drops')">Drop</button>
</div>

<!-- DASHBOARD -->
<div class="panel active" id="panel-dashboard">
  <div class="sec-row">
    <span class="sec-label">Inventory</span>
    <button class="sec-action" onclick="openAddSku()">+ New Flavor</button>
  </div>
  <div class="inv-grid" id="inv-grid"></div>
  <div class="sec-row"><span class="sec-label">Revenue</span></div>
  <div class="rev-card">
    <div class="rev-title">Sales Total</div>
    <div id="rev-rows"></div>
    <hr class="rev-div">
    <div class="rev-total"><span class="l">Net</span><span class="v" id="total-rev">$0</span></div>
    <div id="rev-gift-line" style="display:none;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px dashed rgba(0,0,0,0.15);"></div>
  </div>
  <button style="width:100%;padding:12px 16px;background:var(--blue);border:none;border-radius:3px;color:var(--white);font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;margin-top:12px;font-family:'Rubik',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:11px;" onclick="loadFromSupabase();loadPendingCounts();">&#x21BB; Refresh</button>
</div>

<!-- NEW SALE -->
<div class="panel" id="panel-newsale">

  <!-- SALE ENTRY FORM -->
  <div id="sale-form-wrap">
    <div class="sale-form">
      <div class="fsec">Customer</div>
      <div class="field"><input type="text" id="f-name" placeholder="First name or handle" autocomplete="off"></div>

      <div class="fsec">Items</div>
      <div class="items-list" id="items-list"></div>
      <div class="flavor-picker" id="flavor-picker"></div>

      <div class="fsec" style="margin-top:14px;">Payment</div>
      <div class="pay-pills">
        <button class="pay-pill" onclick="selectPay('Cash',this)">Cash</button>
        <button class="pay-pill" onclick="selectPay('Venmo',this)">Venmo</button>
        <button class="pay-pill" onclick="selectPay('Card',this)">Card</button>
        <button class="pay-pill" onclick="selectPay('Zelle',this)">Zelle</button>
        <button class="pay-pill" onclick="selectPay('Gift',this)">Gift</button>
      </div>

      <div class="fsec" style="margin-top:14px;">Bottles Returned</div>
      <div class="discount-row">
        <button class="ibtn" onclick="changeReturns(-1)" type="button">&#x2212;</button>
        <span class="item-qty" id="f-returns" style="font-size:22px;min-width:32px;">0</span>
        <button class="ibtn" onclick="changeReturns(1)" type="button">+</button>
        <span style="font-size:11px;color:var(--muted);margin-left:6px;letter-spacing:0.5px;">&#x2212;$3 each</span>
      </div>

      <div class="order-summary">
        <span class="ol">Total</span>
        <span class="ov" id="order-total">$0</span>
      </div>
      <button class="submit-btn" onclick="logSale()">Log Sale</button>
    </div>
  </div>

  <!-- SALE CONFIRMED STATE -->
  <div class="sale-success" id="sale-success">
    <div class="si">&#x2713;</div>
    <div class="sm" id="success-name"></div>
    <div class="ss" id="success-detail"></div>
    <button class="log-again-btn" onclick="logAnother()">+ Log Another Sale</button>
    <button class="see-history-btn" onclick="switchTab('history')">View History</button>
  </div>

  <!-- PENDING ORDERS — always at the bottom -->
  <div style="border-top:1px solid var(--border);margin:24px 0 16px;"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <span class="sec-label">Pending Orders</span>
    <span class="hist-count" id="newsale-pending-count">0</span>
  </div>
  <div id="newsale-pending-list">
    <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:8px 0;">No pending orders</div>
  </div>

</div>

<!-- HISTORY -->
<div class="panel" id="panel-history">
  <div class="hist-header">
    <span class="hist-title">All Sales</span>
    <span class="hist-count" id="hist-count">0</span>
  </div>
  <div id="hist-list"><div class="empty-state">No sales yet.</div></div>
</div>

<!-- SKU Modal -->
<div class="modal-overlay" id="sku-modal">
  <div class="modal">
    <div class="modal-hdr"><span id="sku-modal-title">New Flavor</span><button class="modal-close" onclick="closeSkuModal()">&#x2715;</button></div>
    <input type="hidden" id="sm-id">
    <div class="field"><label>Flavor Name</label><input type="text" id="sm-name" autocomplete="off"></div>
    <div class="field-row">
      <div class="field"><label>Bottles</label><input type="number" id="sm-stock" min="1" inputmode="numeric"></div>
      <div class="field"><label>Price ($)</label><input type="number" id="sm-price" min="0.01" step="0.01" inputmode="decimal"></div>
    </div>
    <button class="modal-save" onclick="saveSku()">Save</button>
    <button class="modal-del" id="sku-del-btn" onclick="deleteSku()">Remove Flavor</button>
  </div>
</div>

<!-- DROP PANEL -->
<div class="panel" id="panel-drops">
  <div class="sec-row"><span class="sec-label">Weekly Drop Code</span></div>
  <div class="rev-card" style="margin-bottom:14px;">
    <div class="rev-title">Active Code</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin:8px 0 4px;">
      <div id="active-code-display" style="font-size:24px;font-weight:900;letter-spacing:2px;color:var(--black);">—</div>
      <button id="copy-code-btn" onclick="copyCode()" style="background:var(--black);border:none;border-radius:2px;padding:7px 9px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;" title="Copy code">
  <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
  <svg id="check-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><polyline points="20 6 9 17 4 12"/></svg>
</button>
    </div>
    <div id="active-code-expiry" style="font-size:10px;color:rgba(0,0,0,0.45);font-weight:700;letter-spacing:1px;"></div>
  </div>
  <button class="submit-btn" style="margin-bottom:10px;" onclick="generateCode()">Generate New Code</button>
  <button class="reset-btn" onclick="deactivateCode()">Deactivate Current Code</button>


</div>

<!-- Edit Sale Modal -->
<div class="modal-overlay" id="sale-modal">
  <div class="modal">
    <div class="modal-hdr"><span>Edit Sale</span><button class="modal-close" onclick="closeSaleModal()">&#x2715;</button></div>
    <input type="hidden" id="esm-id">
    <div class="field"><label>Customer Name</label><input type="text" id="esm-name" autocomplete="off"></div>
    <div class="field"><label>Payment</label><input type="text" id="esm-pay" autocomplete="off"></div>
    <div class="field"><label>Bottles Returned (&#x2212;$3 each)</label><input type="number" id="esm-discount" min="0" inputmode="numeric" placeholder="0"></div>
    <div id="esm-items-wrap"></div>
    <button class="modal-save" onclick="saveSaleEdit()">Save Changes</button>
  </div>
</div>

<!-- Pending Order Modal -->
<div class="modal-overlay" id="pending-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span>Pending Order</span>
      <button class="modal-close" onclick="closePendingModal()">&#x2715;</button>
    </div>
    <input type="hidden" id="pm-id">
    <div id="pm-customer" style="margin-bottom:14px;">
      <div style="font-size:16px;font-weight:900;" id="pm-name"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;" id="pm-contact"></div>
    </div>
    <div class="field"><label>Payment Method</label>
      <input type="text" id="pm-pay" placeholder="Cash / Venmo / Zelle..." autocomplete="off">
    </div>
    <div class="field"><label>Notes</label>
      <input type="text" id="pm-notes" placeholder="Optional" autocomplete="off">
    </div>
    <div id="pm-items" style="margin-bottom:14px;"></div>
    <div style="background:rgba(230,255,0,0.08);border:1.5px solid var(--yellow);border-radius:3px;padding:10px 14px;display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;">
      <span style="font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--muted);">Total Due</span>
      <span style="font-size:22px;font-weight:900;color:var(--yellow);" id="pm-total"></span>
    </div>
    <button class="modal-confirm" onclick="confirmPendingOrder()">&#x2713; Confirm Sale</button>
    <button class="modal-del" onclick="declinePendingOrder()">Decline Order</button>
  </div>
</div>

<script>
  // Supabase
  const SUPA_URL = 'https://kqmdnrlpfbnnxxtgbrgd.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxbWRucmxwZmJubnh4dGdicmdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MzE5MjksImV4cCI6MjA5MDQwNzkyOX0.e6kvqx3PHLkpJJc6PiJ6TmBS9f9f0gk5-r2i_vnx5xQ';
  let supa;

  const state = {
    skus: [],
    sales: [],
    nextSkuId: 1
  };

  let cart = [];
  let formPay = null;

  // ── Supabase helpers ──
  async function loadFromSupabase() {
    if (!supa) { console.warn('Supabase not ready'); renderDashboard(); renderHistory(); renderSaleForm(); return; }
    try {
      const [ skuRes, saleRes ] = await Promise.all([
        supa.from('skus').select('*').eq('active', true).order('id'),
        supa.from('orders').select('*, order_items(*)').eq('status','completed').order('created_at', {ascending:false})
      ]);
      if (skuRes.error) console.error('SKU load error:', skuRes.error);
      if (skuRes.data && skuRes.data.length > 0) {
        state.skus = skuRes.data.map(s => ({
          id: s.id, name: s.name, stock: s.stock, sold: s.sold, price: parseFloat(s.price)
        }));
        state.nextSkuId = Math.max(...state.skus.map(s=>s.id)) + 1;
      }
      if (saleRes.data) {
        state.sales = saleRes.data.map(o => ({
          id: o.id,
          name: o.customer_name || '—',
          items: (o.order_items||[]).map(i=>({ skuId:i.sku_id, skuName:i.sku_name, qty:i.qty, price:parseFloat(i.price) })),
          pay: o.pay_method,
          discount: parseFloat(o.discount)||0,
          total: parseFloat(o.total)||0,
          time: new Date(o.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
          status: o.status
        }));
      }
      renderDashboard();
      renderHistory();
      renderSaleForm();
      loadPendingForNewSale();
      loadPendingCounts();
    } catch(e) {
      console.error('Supabase load error:', e);
      renderDashboard();
      renderHistory();
      renderSaleForm();
    }
  }

  async function saveSkuToSupabase(sku) {
    await supa.from('skus').upsert({
      id: sku.id, name: sku.name, stock: sku.stock, sold: sku.sold, price: sku.price, active: true
    });
  }

  async function saveSaleToSupabase(sale) {
    // Upsert customer
    let customerId = null;
    const { data: custData } = await supa.from('customers').select('id').eq('name', sale.name).maybeSingle();
    if (custData) {
      customerId = custData.id;
      await supa.from('customers').update({ total_orders: custData.total_orders ? custData.total_orders+1 : 1 }).eq('id', customerId);
    } else {
      const { data: newCust } = await supa.from('customers').insert({ name: sale.name, first_order_at: new Date().toISOString(), total_orders: 1 }).select().single();
      if (newCust) customerId = newCust.id;
    }
    // Insert order
    const { data: orderData } = await supa.from('orders').insert({
      customer_id: customerId,
      customer_name: sale.name,
      status: 'completed',
      pay_method: sale.pay,
      discount: sale.discount,
      total: sale.total,
      created_at: new Date().toISOString()
    }).select().single();
    if (orderData && sale.items) {
      await supa.from('order_items').insert(sale.items.map(i => ({
        order_id: orderData.id, sku_id: i.skuId, sku_name: i.skuName, qty: i.qty, price: i.price
      })));
    }
    // Update sku sold counts
    for (const item of sale.items) {
      const sku = state.skus.find(s=>s.id===item.skuId);
      if (sku) await supa.from('skus').update({ sold: sku.sold }).eq('id', sku.id);
    }
  }

  async function deleteSaleFromSupabase(id) {
    await supa.from('order_items').delete().eq('order_id', id);
    await supa.from('orders').delete().eq('id', id);
  }

  function saveLocal() {
    try {
      localStorage.setItem('fec_skus', JSON.stringify(state.skus));
      localStorage.setItem('fec_sales', JSON.stringify(state.sales));
    } catch(e) {}
  }

  function switchTab(name) {
    ['dashboard','newsale','history','drops'].forEach((n,i) => {
      document.querySelectorAll('.tab')[i].classList.toggle('active', n===name);
      document.getElementById('panel-'+n).classList.toggle('active', n===name);
    });
    if (name==='newsale') { renderSaleForm(); loadPendingForNewSale(); }
    if (name==='drops') { loadActiveCode(); loadPendingOrders(); }
  }

  /* ── DASHBOARD ── */
  let _pendingQty = {};

  async function loadPendingCounts() {
    if (!supa) return;
    const { data } = await supa.from('orders').select('order_items(sku_id, qty)').eq('status','pending');
    _pendingQty = {};
    if (data) data.forEach(o => (o.order_items||[]).forEach(i => {
      _pendingQty[i.sku_id] = (_pendingQty[i.sku_id]||0) + i.qty;
    }));
    renderDashboard();
  }

  function renderDashboard() {
    document.getElementById('inv-grid').innerHTML = state.skus.map(sku => {
      const rem = sku.stock - sku.sold;
      const pct = sku.stock > 0 ? Math.round((rem/sku.stock)*100) : 0;
      const isLow = rem > 0 && rem <= Math.max(1, Math.floor(sku.stock*0.2));
      const isOut = rem === 0;
      const nc = isOut ? ' out' : isLow ? ' low' : '';
      const bc = isLow ? ' low' : '';
      const pending = _pendingQty[sku.id]||0;
      const pendingLine = pending > 0 ? `<div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--blue);margin-top:6px;">&#x23F3; ${pending} pending</div>` : '';
      return `<div class="inv-card">
        <button class="inv-edit" onclick="openEditSku(${sku.id})">&#x270E;</button>
        <div class="inv-name">${esc(sku.name)}</div>
        <div class="inv-price">$${sku.price} / bottle</div>
        <div class="inv-nums">
          <div><div class="inv-big${nc}">${rem}</div><div class="inv-lbl">left</div></div>
          <div class="inv-right">$${sku.sold*sku.price}<br><b>${sku.sold}</b> sold</div>
        </div>
        <div class="inv-bar"><div class="inv-bar-fill${bc}" style="width:${pct}%"></div></div>
        ${pendingLine}
      </div>`;
    }).join('');

    // Split paid vs gifted sales
    const paidSales = state.sales.filter(s => s.pay !== 'Gift');
    const giftSales = state.sales.filter(s => s.pay === 'Gift');

    // Sum paid revenue per SKU from actual sale records
    const paidSkuTotals = {};
    paidSales.forEach(s => {
      (s.items||[]).forEach(i => {
        paidSkuTotals[i.skuId] = (paidSkuTotals[i.skuId]||0) + (i.qty * i.price);
      });
    });

    // Sum gift qty per SKU
    const giftSkuQty = {};
    giftSales.forEach(s => {
      (s.items||[]).forEach(i => {
        giftSkuQty[i.skuId] = (giftSkuQty[i.skuId]||0) + i.qty;
      });
    });

    // Revenue rows — paid only
    let gross = 0;
    document.getElementById('rev-rows').innerHTML = state.skus.map(sku => {
      const r = paidSkuTotals[sku.id]||0;
      gross += r;
      return `<div class="rev-row"><span class="n">${esc(sku.name)}</span><span class="a">$${r}</span></div>`;
    }).join('');
    document.getElementById('total-rev').textContent = '$' + gross;

    // Gift line — only show if gifts exist
    const totalGiftQty = Object.values(giftSkuQty).reduce((a,b)=>a+b, 0);
    const giftEl = document.getElementById('rev-gift-line');
    if (giftEl) {
      if (totalGiftQty > 0) {
        const giftVal = state.skus.reduce((sum, sku) => {
          return sum + (giftSkuQty[sku.id]||0) * sku.price;
        }, 0);
        giftEl.style.display = 'flex';
        giftEl.innerHTML = `<span style="color:rgba(0,0,0,0.55);font-size:11px;font-weight:500;">&#x1F381; ${totalGiftQty} bottle${totalGiftQty>1?'s':''} gifted</span><span style="font-size:11px;font-weight:700;">$${giftVal} value</span>`;
      } else {
        giftEl.style.display = 'none';
      }
    }
  }

  /* ── SKU MODAL ── */
  function openAddSku() {
    document.getElementById('sku-modal-title').textContent = 'New Flavor';
    document.getElementById('sm-id').value = '';
    document.getElementById('sm-name').value = '';
    document.getElementById('sm-stock').value = '';
    document.getElementById('sm-price').value = '';
    document.getElementById('sku-del-btn').style.display = 'none';
    document.getElementById('sku-modal').classList.add('open');
  }

  function openEditSku(id) {
    const sku = state.skus.find(s=>s.id===id);
    if (!sku) return;
    document.getElementById('sku-modal-title').textContent = 'Edit Flavor';
    document.getElementById('sm-id').value = id;
    document.getElementById('sm-name').value = sku.name;
    document.getElementById('sm-stock').value = sku.stock;
    document.getElementById('sm-price').value = sku.price;
    document.getElementById('sku-del-btn').style.display = 'block';
    document.getElementById('sku-modal').classList.add('open');
  }

  function saveSku() {
    const id = document.getElementById('sm-id').value;
    const name = document.getElementById('sm-name').value.trim();
    const stock = parseInt(document.getElementById('sm-stock').value);
    const price = parseFloat(document.getElementById('sm-price').value);
    if (!name) { alert('Enter a flavor name.'); return; }
    if (!stock || stock < 1) { alert('Enter bottle count.'); return; }
    if (!price || price <= 0) { alert('Enter a price.'); return; }
    if (id) {
      const sku = state.skus.find(s=>s.id===parseInt(id));
      if (sku) {
        if (stock < sku.sold) { alert("Can't set stock below already sold ("+sku.sold+")."); return; }
        sku.name=name; sku.stock=stock; sku.price=price;
      }
    } else {
      state.skus.push({ id:state.nextSkuId++, name, stock, sold:0, price });
    }
    saveSkuToSupabase(id ? state.skus.find(s=>s.id===parseInt(id)) : state.skus[state.skus.length-1]); saveLocal(); closeSkuModal(); renderDashboard(); renderSaleForm();
  }

  function deleteSku() {
    const id = parseInt(document.getElementById('sm-id').value);
    const sku = state.skus.find(s=>s.id===id);
    if (!sku || !confirm('Remove "'+sku.name+'"?')) return;
    state.sales = state.sales.filter(s => !s.items.some(i=>i.skuId===id));
    state.skus = state.skus.filter(s=>s.id!==id);
    cart = cart.filter(c=>c.skuId!==id);
    saveSkuToSupabase(id ? state.skus.find(s=>s.id===parseInt(id)) : state.skus[state.skus.length-1]); saveLocal(); closeSkuModal(); renderDashboard(); renderSaleForm(); renderHistory();
  }

  function closeSkuModal() { document.getElementById('sku-modal').classList.remove('open'); }

  /* ── NEW SALE ── */
  function renderSaleForm() {
    renderFlavorPicker();
    renderCartItems();
    updateOrderTotal();
  }

  function renderFlavorPicker() {
    const addedIds = cart.map(c=>c.skuId);
    document.getElementById('flavor-picker').innerHTML = state.skus.map(sku => {
      const rem = sku.stock - sku.sold;
      const isAdded = addedIds.includes(sku.id);
      const isOut = rem === 0;
      const dis = (isOut || isAdded) ? ' disabled' : '';
      const cls = isAdded ? ' added' : '';
      const sub = isAdded ? 'added' : isOut ? 'sold out' : rem+' left &middot; $'+sku.price;
      return `<button class="flavor-btn${cls}"${dis} onclick="addToCart(${sku.id})">
        <span class="fn">${esc(sku.name)}</span>
        <span class="fs">${sub}</span>
      </button>`;
    }).join('');
  }

  function addToCart(skuId) {
    if (cart.find(c=>c.skuId===skuId)) return;
    cart.push({ skuId, qty:1 });
    renderFlavorPicker(); renderCartItems(); updateOrderTotal();
  }

  function changeQty(skuId, delta) {
    const item = cart.find(c=>c.skuId===skuId);
    if (!item) return;
    const sku = state.skus.find(s=>s.id===skuId);
    const maxAvail = sku ? (sku.stock - sku.sold) : 99;
    const newQty = item.qty + delta;
    if (newQty < 1) { removeFromCart(skuId); return; }
    if (newQty > maxAvail) return;
    item.qty = newQty;
    renderCartItems(); updateOrderTotal();
  }

  function removeFromCart(skuId) {
    cart = cart.filter(c=>c.skuId!==skuId);
    renderFlavorPicker(); renderCartItems(); updateOrderTotal();
  }

  function renderCartItems() {
    const list = document.getElementById('items-list');
    if (!cart.length) { list.innerHTML = ''; return; }
    list.innerHTML = cart.map(item => {
      const sku = state.skus.find(s=>s.id===item.skuId);
      if (!sku) return '';
      return `<div class="item-row">
        <div class="item-row-left">
          <div class="item-row-name">${esc(sku.name)}</div>
          <div class="item-row-price">$${sku.price} &times; ${item.qty} = $${sku.price*item.qty}</div>
        </div>
        <div class="item-row-controls">
          <button class="ibtn" onclick="changeQty(${sku.id},-1)">&#x2212;</button>
          <span class="item-qty">${item.qty}</span>
          <button class="ibtn" onclick="changeQty(${sku.id},1)">+</button>
          <button class="item-remove" onclick="removeFromCart(${sku.id})">&#x2715;</button>
        </div>
      </div>`;
    }).join('');
  }

  let formReturns = 0;

  function changeReturns(delta) {
    const newVal = formReturns + delta;
    if (newVal < 0) return;
    formReturns = newVal;
    document.getElementById('f-returns').textContent = newVal;
    updateOrderTotal();
  }

  function updateOrderTotal() {
    if (formPay === 'Gift') {
      document.getElementById('order-total').textContent = '$0';
      return;
    }
    const disc = formReturns * 3;
    const subtotal = cart.reduce((sum,item) => {
      const sku = state.skus.find(s=>s.id===item.skuId);
      return sum + (sku ? sku.price*item.qty : 0);
    }, 0);
    const total = formPay === 'Gift' ? 0 : Math.max(0, subtotal - disc);
    const fmt = Number.isInteger(total) ? total : total.toFixed(2);
    document.getElementById('order-total').textContent = '$' + fmt;
  }

  function selectPay(method, el) {
    formPay = method;
    document.querySelectorAll('.pay-pill').forEach(p=>p.classList.remove('selected'));
    el.classList.add('selected');
    updateOrderTotal();
  }

  function logSale() {
    const name = document.getElementById('f-name').value.trim();
    if (!name)        { alert('Enter a customer name.'); return; }
    if (!cart.length) { alert('Add at least one item.'); return; }
    if (!formPay)     { alert('Select a payment method.'); return; }
    const disc = formReturns * 3;
    const subtotal = cart.reduce((sum,item) => {
      const sku = state.skus.find(s=>s.id===item.skuId);
      return sum + (sku ? sku.price*item.qty : 0);
    }, 0);
    const total = formPay === 'Gift' ? 0 : Math.max(0, subtotal - disc);
    cart.forEach(item => {
      const sku = state.skus.find(s=>s.id===item.skuId);
      if (sku) sku.sold += item.qty;
    });
    const sale = {
      id:Date.now(), name,
      items: cart.map(c => {
        const sku = state.skus.find(s=>s.id===c.skuId);
        return { skuId:c.skuId, skuName:sku?sku.name:'?', qty:c.qty, price:sku?sku.price:0 };
      }),
      pay:formPay, discount:disc, total,
      time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
    };
    state.sales.unshift(sale);
    saveLocal(); saveSaleToSupabase(sale); renderDashboard(); renderHistory();
    document.getElementById('sale-form-wrap').style.display='none';
    document.getElementById('sale-success').classList.add('show');
    document.getElementById('success-name').textContent = name + ' \u2014 $' + (Number.isInteger(total)?total:total.toFixed(2));
    const lines = sale.items.map(i=>i.skuName+' \xd7'+i.qty).join(', ');
    document.getElementById('success-detail').textContent = lines + (formReturns>0?' \u00b7 '+formReturns+' bottle'+(formReturns>1?'s':'')+' returned':'');
  }

  function logAnother() {
    cart=[]; formPay=null;
    document.getElementById('f-name').value='';
    formReturns=0;
    document.getElementById('f-returns').textContent='0';
    document.querySelectorAll('.pay-pill').forEach(p=>p.classList.remove('selected'));
    document.getElementById('sale-form-wrap').style.display='block';
    document.getElementById('sale-success').classList.remove('show');
    renderSaleForm();
  }

  /* ── HISTORY ── */
  function renderHistory() {
    const list = document.getElementById('hist-list');
    document.getElementById('hist-count').textContent = state.sales.length;
    if (!state.sales.length) { list.innerHTML='<div class="empty-state">No sales yet.</div>'; return; }
    list.innerHTML = state.sales.map(s => {
      const lines = s.items.map(i=>`<div class="sc-item-line"><b>${esc(i.skuName)}</b> \xd7${i.qty} &mdash; $${i.price*i.qty}</div>`).join('');
      const bottles = s.discount>0 ? Math.round(s.discount/3) : 0;
      const discTag = bottles>0?`<span class="tag tdisc">${bottles} bottle${bottles>1?'s':''} returned</span>`:'';
      const tot = Number.isInteger(s.total)?s.total:s.total.toFixed(2);
      return `<div class="sale-card">
        <div class="sc-top"><div class="sc-name">${esc(s.name)}</div><div class="sc-amt">$${tot}${s.discount>0?'<span style="font-size:10px;color:var(--blue);display:block;font-weight:700;text-align:right;">\u2212$'+s.discount+' ('+Math.round(s.discount/3)+' returned)</span>':''}</div></div>
        <div class="sc-items">${lines}</div>
        <div class="sc-bot">
          <div class="sc-tags">
            <span class="tag tpay" style="${s.pay==='Gift'?'background:rgba(230,255,0,0.15);color:var(--yellow);':''}">${s.pay}</span>
            ${discTag}
            <span class="tag ttime">${s.time}</span>
          </div>
          <div class="sc-actions">
            <button class="edit-btn" onclick="openEditSale(${s.id})">Edit</button>
            <button class="del-btn" onclick="deleteSale(${s.id})">&#x2715;</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function deleteSale(id) {
    const idx = state.sales.findIndex(s=>s.id===id);
    if (idx===-1) return;
    state.sales[idx].items.forEach(item => {
      const sku = state.skus.find(sk=>sk.id===item.skuId);
      if (sku) sku.sold = Math.max(0, sku.sold-item.qty);
    });
    const delId = state.sales[idx].id;
    state.sales.splice(idx,1);
    saveLocal(); deleteSaleFromSupabase(delId); renderDashboard(); renderHistory();
  }

  function openEditSale(id) {
    const s = state.sales.find(x=>x.id===id);
    if (!s) return;
    document.getElementById('esm-id').value = id;
    document.getElementById('esm-name').value = s.name;
    document.getElementById('esm-pay').value = s.pay;
    document.getElementById('esm-discount').value = s.discount>0 ? Math.round(s.discount/3) : 0;
    document.getElementById('esm-items-wrap').innerHTML = s.items.map((item,idx)=>`
      <div class="field"><label>${esc(item.skuName)} qty</label>
      <input type="number" id="esm-qty-${idx}" value="${item.qty}" min="1" inputmode="numeric"></div>`).join('');
    document.getElementById('sale-modal').classList.add('open');
  }

  function saveSaleEdit() {
    const id = parseInt(document.getElementById('esm-id').value);
    const name = document.getElementById('esm-name').value.trim();
    const pay = document.getElementById('esm-pay').value.trim();
    const returns = parseInt(document.getElementById('esm-discount').value)||0;
    const disc = returns * 3;
    if (!name||!pay) { alert('Fill in all fields.'); return; }
    const s = state.sales.find(x=>x.id===id);
    if (!s) return;
    // revert inventory
    s.items.forEach(item => {
      const sku = state.skus.find(sk=>sk.id===item.skuId);
      if (sku) sku.sold = Math.max(0, sku.sold-item.qty);
    });
    // apply new qtys
    let ok = true;
    s.items.forEach((item,idx) => {
      const newQty = parseInt(document.getElementById('esm-qty-'+idx).value)||1;
      const sku = state.skus.find(sk=>sk.id===item.skuId);
      if (sku && sku.sold+newQty > sku.stock) { alert('Not enough stock for '+item.skuName); ok=false; }
      else { item.qty=newQty; if(sku) sku.sold+=newQty; }
    });
    if (!ok) return;
    const subtotal = s.items.reduce((sum,i)=>sum+(i.price*i.qty),0);
    s.name=name; s.pay=pay; s.discount=disc; s.total=Math.max(0,subtotal-disc);
    saveLocal(); closeSaleModal(); renderDashboard(); renderHistory();
  }

  function closeSaleModal() { document.getElementById('sale-modal').classList.remove('open'); }
  document.getElementById('sku-modal').addEventListener('click',function(e){if(e.target===this)closeSkuModal();});
  document.getElementById('sale-modal').addEventListener('click',function(e){if(e.target===this)closeSaleModal();});


  function resetAll() {
    if (!confirm('Reset session? Clears all sales and inventory counts.')) return;
    state.skus.forEach(s=>s.sold=0);
    state.sales=[];
    saveLocal(); logAnother(); renderDashboard(); renderHistory();
  }


  // ── THEMED CODE GENERATOR ──
  const CODE_THEMES = {
    'four_eyes': [
      ['FIRST-BLOOM','DRAGON-PEARL','OFFBEAT-AURA','HAZE-RISE','OBSERVER','SLOW-DRIP','COLD-SOUL','FOUR-EYES','COFFEE-WITH-SOUL','PATIENCE'],
    ],
    'coffee_vibe': [
      ['SLOW-POUR','COLD-WAVE','DARK-PULL','DEEP-BREW','STILL-STEEP','QUIET-GRIND','DARK-MATTER','SLOW-EXTRACT','COLD-PRESS','DEEP-ROAST'],
    ],
    'la_soul': [
      ['GOLDEN-HOUR','MARINE-LAYER','ECHO-SOUL','SILVER-LAKE','CRENSHAW-WAVE','SUNSET-PULL','EAST-SIDE','HIGHLAND-DRIP','ANGELES-SLOW','PICO-FLOW'],
    ],
    'soul_life': [
      ['QUIET-STORM','STILL-WATER','SLOW-BURN','DEEP-CUTS','INNER-PEACE','SOUL-TIED','GOOD-FEELING','WARM-LIGHT','STEADY-WAVE','ROOT-DOWN'],
    ]
  };

  function generateCode() {
    const themes = Object.keys(CODE_THEMES);
    const theme = themes[Math.floor(Math.random()*themes.length)];
    const words = CODE_THEMES[theme][0];
    const phrase = words[Math.floor(Math.random()*words.length)];
    const num = String(Math.floor(Math.random()*90)+10);
    const parts = phrase.split('-');
    const pos = Math.floor(Math.random()*3); // 0=before, 1=middle, 2=after
    let code;
    if (pos === 0) {
      code = num + '-' + phrase;
    } else if (pos === 2) {
      code = phrase + '-' + num;
    } else {
      if (parts.length > 1) {
        const mid = Math.floor(parts.length / 2);
        parts.splice(mid, 0, num);
        code = parts.join('-');
      } else {
        code = phrase + '-' + num;
      }
    }
    const expires = new Date();
    expires.setDate(expires.getDate() + 7);
    saveCodeToSupabase(code, expires.toISOString());
    showActiveCode(code, expires);
  }

  function showActiveCode(code, expires) {
    document.getElementById('active-code-display').textContent = code;
    const expDate = new Date(expires).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    document.getElementById('active-code-expiry').textContent = 'Expires ' + expDate;
  }

  function copyCode() {
    const code = document.getElementById('active-code-display').textContent;
    if (!code || code === '—') return;
    const showCheck = () => {
      document.getElementById('copy-icon').style.display = 'none';
      document.getElementById('check-icon').style.display = 'block';
      document.getElementById('copy-code-btn').style.background = 'var(--black)';
      setTimeout(() => {
        document.getElementById('copy-icon').style.display = 'block';
        document.getElementById('check-icon').style.display = 'none';
        document.getElementById('copy-code-btn').style.background = 'var(--black)';
      }, 1500);
    };
    navigator.clipboard.writeText(code).then(showCheck).catch(() => {
      const el = document.createElement('textarea');
      el.value = code; document.body.appendChild(el);
      el.select(); document.execCommand('copy');
      document.body.removeChild(el);
      showCheck();
    });
  }

  async function saveCodeToSupabase(code, expiresAt) {
    await supa.from('access_codes').update({ active: false }).eq('active', true);
    await supa.from('access_codes').insert({ code, active: true, expires_at: expiresAt });
  }

  async function deactivateCode() {
    await supa.from('access_codes').update({ active: false }).eq('active', true);
    document.getElementById('active-code-display').textContent = '—';
    document.getElementById('active-code-expiry').textContent = 'No active code';
  }

  async function loadActiveCode() {
    const { data } = await supa.from('access_codes').select('*').eq('active', true).maybeSingle();
    if (data) showActiveCode(data.code, data.expires_at);
    else { document.getElementById('active-code-display').textContent = '—'; document.getElementById('active-code-expiry').textContent = 'No active code'; }
  }

  async function loadPendingOrders() {
    const { data } = await supa.from('orders').select('*, order_items(*)').eq('status','pending').order('created_at',{ascending:false});
    const list = document.getElementById('pending-list');
    document.getElementById('pending-count').textContent = data ? data.length : 0;
    if (!data || !data.length) { list.innerHTML='<div class="empty-state">No pending orders.</div>'; return; }
    list.innerHTML = data.map(o => {
      const lines = (o.order_items||[]).map(i=>`${i.sku_name} ×${i.qty}`).join(', ');
      return `<div class="pending-card">
        <div class="pending-card-top">
          <div class="pending-name">${esc(o.customer_name||'—')}</div>
          <div class="pending-window">${o.fulfillment_type||''} · ${o.fulfillment_window||''}</div>
        </div>
        <div class="pending-items">${lines}</div>
        <div class="pending-actions">
          <button class="approve-btn" onclick="approveOrder(${o.id})">View & Approve</button>
          <button class="reject-btn" onclick="rejectOrder(${o.id})">Decline</button>
        </div>
      </div>`;
    }).join('');
  }

  async function approveOrder(id) {
    const { data: order } = await supa.from('orders').select('*, order_items(*)').eq('id', id).single();
    if (!order) return;
    openPendingModal(order);
  }

  async function rejectOrder(id) {
    await supa.from('orders').update({ status: 'rejected' }).eq('id', id);
    loadPendingOrders();
    loadPendingForNewSale();
  }

  async function loadPendingForNewSale() {
    if (!supa) return;
    const { data } = await supa.from('orders').select('*, order_items(*)').eq('status','pending').order('created_at',{ascending:false});
    const list = document.getElementById('newsale-pending-list');
    const countEl = document.getElementById('newsale-pending-count');
    if (!data || !data.length) {
      if (countEl) countEl.textContent = '0';
      if (list) list.innerHTML = '<div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:8px 0;">No pending orders</div>';
      return;
    }
    if (countEl) countEl.textContent = data.length;
    list.innerHTML = data.map(o => {
      const lines = (o.order_items||[]).map(i=>`${i.sku_name} ×${i.qty}`).join(', ');
      return `<div class="pending-card">
        <div class="pending-card-top">
          <div class="pending-name">${esc(o.customer_name||'—')}</div>
          <div class="pending-window">${o.fulfillment_type||''} ${o.fulfillment_window ? '· '+o.fulfillment_window : ''}</div>
        </div>
        <div class="pending-items">${lines}</div>
        <div class="pending-actions">
          <button class="approve-btn" onclick="approveOrder(${o.id})">View & Approve</button>
          <button class="reject-btn" onclick="rejectOrder(${o.id})">Decline</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── PENDING ORDER MODAL ──
  let pendingModalOrder = null;

  function openPendingModal(order) {
    pendingModalOrder = order;
    document.getElementById('pm-id').value = order.id;
    document.getElementById('pm-name').textContent = order.customer_name || '—';
    document.getElementById('pm-contact').textContent = order.fulfillment_type + ' · ' + (order.fulfillment_window||'TBD');
    document.getElementById('pm-pay').value = '';
    document.getElementById('pm-notes').value = order.notes||'';
    document.getElementById('pm-total').textContent = '$' + (order.total||0);
    const items = (order.order_items||[]);
    document.getElementById('pm-items').innerHTML = '<div style="font-size:9px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Items</div>' +
      items.map(i => `<div class="pending-modal-item"><span class="pk">${esc(i.sku_name)}</span><span class="pv">×${i.qty} &mdash; $${i.price*i.qty}</span></div>`).join('');
    document.getElementById('pending-modal').classList.add('open');
  }

  function closePendingModal() {
    document.getElementById('pending-modal').classList.remove('open');
    pendingModalOrder = null;
  }

  async function confirmPendingOrder() {
    if (!pendingModalOrder) return;
    const pay = document.getElementById('pm-pay').value.trim() || 'Confirmed';
    const id = pendingModalOrder.id;
    const o = pendingModalOrder;

    // Deduct inventory
    const items = o.order_items||[];
    for (const item of items) {
      const sku = state.skus.find(s=>s.id===item.sku_id);
      if (sku) {
        sku.sold += item.qty;
        await supa.from('skus').update({ sold: sku.sold }).eq('id', sku.id);
      }
    }

    // Log as completed sale in state
    const sale = {
      id, name: o.customer_name||'—',
      items: items.map(i=>({ skuId:i.sku_id, skuName:i.sku_name, qty:i.qty, price:parseFloat(i.price) })),
      pay, discount:0, total: parseFloat(o.total)||0,
      time: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
    };
    state.sales.unshift(sale);
    saveLocal();

    // Update order status in Supabase
    await supa.from('orders').update({ status:'completed', pay_method: pay }).eq('id', id);

    closePendingModal();
    loadPendingForNewSale();
    loadPendingOrders();
    loadPendingCounts();
    renderDashboard();
    renderHistory();
  }

  async function declinePendingOrder() {
    if (!pendingModalOrder) return;
    if (!confirm('Decline this order?')) return;
    await supa.from('orders').update({ status:'rejected' }).eq('id', pendingModalOrder.id);
    closePendingModal();
    loadPendingForNewSale();
    loadPendingOrders();
    loadPendingCounts();
  }

  document.getElementById('pending-modal').addEventListener('click', function(e) { if(e.target===this) closePendingModal(); });

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  document.getElementById('session-date').textContent =
    new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  // Load from localStorage immediately so screen isn't blank while Supabase loads
  try {
    const cachedSkus = localStorage.getItem('fec_skus');
    const cachedSales = localStorage.getItem('fec_sales');
    if (cachedSkus) state.skus = JSON.parse(cachedSkus);
    if (cachedSales) state.sales = JSON.parse(cachedSales);
    if (state.skus.length || state.sales.length) {
      renderDashboard(); renderSaleForm(); renderHistory();
    } else {
      document.getElementById('inv-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);">Loading...</div>';
    }
  } catch(e) {}

  // Wait for supabase CDN to be ready
  function waitForSupabase(cb, attempts=0) {
    if (typeof supabase !== 'undefined') { cb(); }
    else if (attempts < 20) { setTimeout(() => waitForSupabase(cb, attempts+1), 100); }
    else { console.warn('Supabase CDN not loaded'); renderDashboard(); renderHistory(); renderSaleForm(); }
  }
  waitForSupabase(() => {
    supa = supabase.createClient(SUPA_URL, SUPA_KEY);
    loadFromSupabase();
  });
</script>
</body>
