<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Four Eyes Coffee</title>

  <!-- PWA / home screen -->
  <link rel="apple-touch-icon" href="assets/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Four Eyes">

  <!-- Supabase CDN — must load before any js/ scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Brand font -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">

  <!-- All styles: single source of truth -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ── PIN screen ─────────────────────────────────────────────── -->
<div id="pin-overlay">
  <img class="pin-logo" src="assets/logo.png" alt="Four Eyes Coffee">
  <div class="pin-label">Enter PIN to continue</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pin-dot-0"></div>
    <div class="pin-dot" id="pin-dot-1"></div>
    <div class="pin-dot" id="pin-dot-2"></div>
    <div class="pin-dot" id="pin-dot-3"></div>
  </div>
  <div class="pin-numpad">
    <button class="pin-key" onclick="pinPress('1')">1</button>
    <button class="pin-key" onclick="pinPress('2')">2</button>
    <button class="pin-key" onclick="pinPress('3')">3</button>
    <button class="pin-key" onclick="pinPress('4')">4</button>
    <button class="pin-key" onclick="pinPress('5')">5</button>
    <button class="pin-key" onclick="pinPress('6')">6</button>
    <button class="pin-key" onclick="pinPress('7')">7</button>
    <button class="pin-key" onclick="pinPress('8')">8</button>
    <button class="pin-key" onclick="pinPress('9')">9</button>
    <button class="pin-key pin-zero" onclick="pinPress('0')">0</button>
    <button class="pin-key pin-back" onclick="pinBack()">⌫</button>
  </div>
  <div class="pin-error" id="pin-error">Incorrect PIN</div>
</div>

<!-- ── Header ─────────────────────────────────────────────────── -->
<header>
  <img class="logo-img" src="assets/logo.png" alt="Four Eyes Coffee">
  <span class="session-date" id="session-date"></span>
  <button class="update-btn" id="update-btn" onclick="checkForUpdate()" style="display:none;">
    <span class="update-dot"></span>
    <span id="update-label">↑</span>
  </button>
</header>

<!-- ── Main panels ────────────────────────────────────────────── -->
<main>

  <!-- DASHBOARD -->
  <div class="panel active" id="panel-dashboard">
    <!-- Populated by dashboard.js -->
  </div>

  <!-- NEW SALE -->
  <div class="panel" id="panel-newsale">
    <!-- Populated by newSale.js -->
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div class="inner-tab-bar">
      <button class="inner-tab active" data-inner="saleslog"
              onclick="switchInnerTab('panel-history','saleslog')">Sales Log</button>
      <button class="inner-tab" data-inner="reconcile"
              onclick="switchInnerTab('panel-history','reconcile')">Reconcile</button>
    </div>
    <div class="inner-panel active" id="inner-saleslog">
      <!-- Populated by history/salesLog.js -->
    </div>
    <div class="inner-panel" id="inner-reconcile">
      <!-- Populated by history/reconcile.js -->
    </div>
  </div>

  <!-- STORE HUB -->
  <div class="panel" id="panel-storehub">
    <div class="inner-tab-bar">
      <button class="inner-tab active" data-inner="inventory"
              onclick="switchInnerTab('panel-storehub','inventory')">Inventory</button>
      <button class="inner-tab" data-inner="cogs"
              onclick="switchInnerTab('panel-storehub','cogs')">COGS</button>
      <button class="inner-tab" data-inner="dropcodes"
              onclick="switchInnerTab('panel-storehub','dropcodes')">Drop Codes</button>
      <button class="inner-tab disabled" data-inner="fulfillment"
              title="Coming soon">Fulfillment</button>
    </div>
    <div class="inner-panel active" id="inner-inventory">
      <!-- Populated by storeHub/inventory.js -->
    </div>
    <div class="inner-panel" id="inner-cogs">
      <!-- Populated by storeHub/cogs.js -->
    </div>
    <div class="inner-panel" id="inner-dropcodes">
      <!-- Populated by storeHub/dropCodes.js -->
    </div>
    <div class="inner-panel" id="inner-fulfillment">
      <!-- Populated by storeHub/fulfillment.js -->
    </div>
  </div>

</main>

<!-- ── Bottom nav ─────────────────────────────────────────────── -->
<nav class="bottom-nav">

  <button class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')">
    <span class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </span>
    Dashboard
  </button>

  <button class="nav-item" data-tab="newsale" onclick="switchTab('newsale')">
    <span class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </span>
    New Sale
  </button>

  <button class="nav-item" data-tab="history" onclick="switchTab('history')">
    <span class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
        <line x1="12" y1="7" x2="12" y2="12"/>
        <line x1="12" y1="12" x2="15" y2="15"/>
      </svg>
    </span>
    History
  </button>

  <button class="nav-item" data-tab="storehub" onclick="switchTab('storehub')">
    <span class="nav-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </span>
    Store Hub
  </button>

</nav>

<!-- ── Modals (shared, operated on by Phase 3 modules) ────────── -->

<!-- SKU modal -->
<div class="modal-overlay" id="sku-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span id="sku-modal-title">New Flavor</span>
      <button class="modal-close" onclick="closeSkuModal()">&#x2715;</button>
    </div>
    <input type="hidden" id="sm-id">
    <div class="field">
      <label>Flavor Name</label>
      <input type="text" id="sm-name" autocomplete="off">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Bottles</label>
        <input type="number" id="sm-stock" min="1" inputmode="numeric">
      </div>
      <div class="field">
        <label>Price ($)</label>
        <input type="number" id="sm-price" min="0.01" step="0.01" inputmode="decimal">
      </div>
    </div>
    <button class="modal-save" onclick="saveSku()">Save</button>
    <button class="modal-del" id="sku-del-btn" onclick="deleteSku()">Remove Flavor</button>
  </div>
</div>

<!-- Edit sale modal -->
<div class="modal-overlay" id="sale-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span>Edit Sale</span>
      <button class="modal-close" onclick="closeSaleModal()">&#x2715;</button>
    </div>
    <input type="hidden" id="esm-id">
    <div class="field">
      <label>Customer Name</label>
      <input type="text" id="esm-name" autocomplete="off">
    </div>
    <div class="field">
      <label>Payment</label>
      <select id="esm-pay" class="pay-select">
        <option value="Venmo">Venmo</option>
        <option value="Cash">Cash</option>
        <option value="Zelle">Zelle</option>
        <option value="Card">Card</option>
        <option value="Gift">Gift</option>
      </select>
    </div>
    <div class="field">
      <label>Bottles Returned (&#x2212;$3 each)</label>
      <input type="number" id="esm-discount" min="0" inputmode="numeric" placeholder="0">
    </div>
    <div id="esm-items-wrap"></div>
    <button class="modal-save" onclick="saveSaleEdit()">Save Changes</button>
  </div>
</div>

<!-- Pending order modal -->
<div class="modal-overlay" id="pending-modal">
  <div class="modal">
    <div class="modal-hdr">
      <span>Pending Order</span>
      <button class="modal-close" onclick="closePendingModal()">&#x2715;</button>
    </div>
    <input type="hidden" id="pm-id">
    <div id="pm-customer">
      <div class="pm-name"    id="pm-name"></div>
      <div class="pm-contact" id="pm-contact"></div>
    </div>
    <div class="field" style="margin-top:14px;">
      <label>Payment Method</label>
      <select id="pm-pay" class="pay-select">
        <option value="">Select payment...</option>
        <option value="Venmo">Venmo</option>
        <option value="Cash">Cash</option>
        <option value="Zelle">Zelle</option>
        <option value="Card">Card</option>
        <option value="Gift">Gift</option>
      </select>
    </div>
    <div class="field">
      <label>Notes</label>
      <input type="text" id="pm-notes" placeholder="Optional" autocomplete="off">
    </div>
    <div id="pm-items"></div>
    <div class="pm-total-box">
      <span class="pm-total-lbl">Total Due</span>
      <span class="pm-total-val" id="pm-total"></span>
    </div>
    <button class="modal-confirm" onclick="confirmPendingOrder()">&#x2713; Confirm Sale</button>
    <button class="modal-del"     onclick="declinePendingOrder()">Decline Order</button>
  </div>
</div>

<!-- ── Scripts — load order matters ──────────────────────────── -->
<!-- supabase.js first: defines all db* functions                 -->
<!-- app.js second:     defines state, utils, routing, boot       -->
<!-- Phase 3 modules follow — order within phase doesn't matter   -->
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/newSale.js"></script>
<script src="js/history/salesLog.js"></script>
<script src="js/history/reconcile.js"></script>
<script src="js/storeHub/inventory.js"></script>
<script src="js/storeHub/cogs.js"></script>
<script src="js/storeHub/dropCodes.js"></script>
<script src="js/storeHub/fulfillment.js"></script>

<script>
  // All module scripts are loaded — initialize panels in order.
  // Doing this here guarantees every function and every DOM element
  // exists before any init runs.
  initDashboard();
  initNewSale();
  initSalesLog();
  initInventory();
  initDropCodes();
</script>

</body>
</html>
